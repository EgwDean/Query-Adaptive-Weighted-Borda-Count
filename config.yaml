# ============================================================================
# Query-Adaptive Weighted Borda Count  --  configuration
# ----------------------------------------------------------------------------
# Phase 1 goal: find the BEIR dataset that best balances LEXICAL and SEMANTIC
# retrieval (highest per-query oracle-alpha spread, or alpha centred on 0.5),
# so it is the strongest test bed for the adaptive Weighted Borda Count system.
#
# Workflow (run ONCE per dataset, manually, on the HPC):
#   1. set `dataset:` below to one name from the catalogue
#   2. python src/download.py          # download that BEIR dataset
#   3. python src/embed.py             # embed its docs + queries (all-mpnet)
#   4. python src/alpha_distribution.py# BM25 + dense, oracle alpha, boxplots
# Repeat for each dataset you want to compare.
# ============================================================================

# ---- ACTIVE DATASET --------------------------------------------------------
# Change this line for each run, then re-run the three scripts.
dataset: hotpotqa

# ---- BEIR DATASET CATALOGUE ------------------------------------------------
# Uncomment the one you want into `dataset:` above. Stats are approximate
# (corpus size / #queries on the eval split / avg relevant docs per query /
# UNZIPPED on-disk size). "avg rel/query" is BEIR's reported Avg. D/Q and
# strongly shapes NDCG/Recall behaviour (e.g. trec-covid ~493 vs msmarco ~1).
# Disk sizes are estimates from corpus_count x avg doc length (BEIR has no
# official disk sizes); plan for headroom. "split" is the split that carries
# qrels; set `split:` below to match.
#
#   name                corpus docs   queries   avg rel/query   ~disk(unzip)  split
#   ------------------  -----------   -------   -------------   -----------   -----
#   scifact                  5,183        300            1.1       ~8 MB      test
#   nfcorpus                 3,633        323           38.2       ~8 MB      test
#   arguana                  8,674      1,406            1.0      ~10 MB      test
#   scidocs                 25,657      1,000            4.9      ~30 MB      test
#   fiqa                    57,638        648            2.6      ~50 MB      test
#   trec-covid             171,332         50          493.5     ~180 MB      test
#   webis-touche2020       382,545         49           19.0     ~700 MB      test
#   quora                  522,931     10,000            1.6      ~60 MB      test
#   dbpedia-entity       4,635,922        400           38.2      ~1.7 GB     test
#   nq                   2,681,468      3,452            1.2      ~1.5 GB     test
#   hotpotqa             5,233,329      7,405            2.0      ~1.8 GB     test
#   fever                5,416,568      6,666            1.2      ~3.1 GB     test
#   climate-fever        5,416,593      1,535            3.0      ~3.1 GB     test
#   msmarco              8,841,823      6,980            1.1      ~3.5 GB     dev
#
# Feasibility note: BM25 (bm25s, in-RAM sparse) + dense brute-force similarity
# are comfortable up to a few hundred-k docs on a single node. The million-doc
# sets (nq/hotpotqa/fever/climate-fever/dbpedia/msmarco) need large RAM/VRAM and
# are best left until after a balanced mid-size dataset is chosen. Start small:
#   scifact, nfcorpus, fiqa, scidocs, arguana  (sanity + speed)
#   trec-covid, webis-touche2020               (lexical-leaning, key for balance)

# Eval split that carries qrels for the active dataset (test for all BEIR
# datasets except msmarco, which uses dev).
split: test

# ---- PATHS (relative to repo root) -----------------------------------------
paths:
  data_dir: data
  datasets_subdir: datasets         # data/datasets/<dataset>/   (raw BEIR)
  processed_subdir: processed_data  # data/processed_data/<dataset>/ (embeddings)
  results_subdir: results           # data/results/
  # One sub-folder inside results/ per experiment phase, so each phase's outputs
  # stay separate (dataset-selection now; model-training benchmarks later).
  alpha_results_subdir: alpha_distribution  # data/results/alpha_distribution/
  bm25_tuning_subdir: bm25_tuning           # data/results/bm25_tuning/
  feature_dataset_subdir: feature_dataset   # data/results/feature_dataset/
  router_screening_subdir: router_screening # data/results/router_screening/

# ---- LEXICAL RETRIEVER: BM25 -----------------------------------------------
# BM25 is the lexical representative. There is NO universal best k1/b -- it is
# corpus-dependent, which is why src/tune_bm25.py grid-searches it per dataset
# (see bm25_tuning below) rather than relying on a fixed literature default.
#
# Values below = tune_bm25.py output for dataset: hotpotqa (mean NDCG@100 over
# all queries with qrels; see data/results/bm25_tuning/ for the full grid).
# Re-run tune_bm25.py and update this block whenever `dataset:` changes.
bm25:
  method: lucene        # bm25s scoring variant: lucene | robertson | atire | bm25l | bm25+
  k1: 0.8                # tuned on hotpotqa via src/tune_bm25.py
  b: 0.4                 # tuned on hotpotqa via src/tune_bm25.py
  use_stemming: true    # tuned on hotpotqa via src/tune_bm25.py

# ---- BM25 TUNING GRID (src/tune_bm25.py) -----------------------------------
# Grid search over k1, b, and stemming on the ACTIVE dataset. Every combination
# retrieves all queries and is scored by mean NDCG@100; the best combination is
# written to results/bm25_tuning/ for you to copy into the `bm25` block above.
# Values below are the well-known BM25 settings (Anserini 0.9/0.4, Lucene 1.2/0.75,
# classic Okapi ranges). Default grid = 8 x 7 x 2 = 112 runs.
bm25_tuning:
  k1: [0.4, 0.6, 0.8, 0.9, 1.0, 1.2, 1.6, 2.0]
  b:  [0.3, 0.4, 0.5, 0.6, 0.75, 0.9, 1.0]
  use_stemming: [true, false]

# ---- SEMANTIC RETRIEVER: dense embeddings ----------------------------------
# all-mpnet-base-v2 chosen deliberately for STRENGTH PARITY with tuned BM25
# (so the oracle alpha is not collapsed to a corner). 768-dim, cosine, no
# query/passage prefixes required.
#
# Memory scaling (so datasets up to MS MARCO's 8.8M docs fit on this box):
#   - embeddings are written to a .npy MEMMAP shard-by-shard, so the full
#     matrix is never held in RAM while encoding;
#   - embedding_dtype=float32 (default) keeps full precision (8.8M x 768: ~27 GB
#     on disk); set to float16 to halve RAM/disk (~13.5 GB) if space is tight;
#   - dense retrieval scans the corpus in CHUNKS on the GPU, so VRAM stays flat
#     regardless of corpus size, and matches embedding_dtype (fp32 by default).
dense:
  model_name: sentence-transformers/all-mpnet-base-v2
  batch_size: 256          # encoding batch size (lower if GPU OOM)
  max_seq_length: 384      # truncation length for documents
  normalize: true          # L2-normalise -> dot product == cosine
  device: cuda             # "cuda" or "cpu"; falls back to cpu automatically
  embedding_dtype: float32 # cached embedding storage: float32 (full precision) or float16 (half RAM/disk)
  encode_shard_size: 100000  # docs encoded per shard, streamed to the memmap (caps host RAM)
  retrieval_chunk_size: 50000 # corpus rows scored per GPU block in dense retrieval (caps VRAM)
  query_batch_size: 2048      # queries scored per batch; VRAM for the similarity block ~= query_batch_size * retrieval_chunk_size * 4 bytes (lower both if CUDA OOM)

# ---- RETRIEVAL DEPTH -------------------------------------------------------
# top_k    = candidate pool depth per retriever, AND the Weighted Borda list
#            length N (fusion headroom / recall pool). Raised to 1000 to match
#            standard BEIR practice (retrieve deep via pytrec_eval, evaluate at
#            a shallower cutoff) -- see docs/bm25_parameter_history.md for the
#            depth-100 -> depth-1000 transition and why it matters for Phase 1.
# eval_k   = the cutoff used to SCORE and SELECT: oracle-alpha search,
#            tune_bm25.py, and the reported NDCG columns. Deliberately
#            DECOUPLED from top_k -- candidates are pooled at top_k for
#            fusion headroom, but quality is judged/optimised at a realistic,
#            BEIR-standard depth. PRIMARY METRIC = NDCG@eval_k (NDCG@10).
retrieval:
  top_k: 1000            # candidate pool depth per retriever + Borda list length N
  eval_k: 10              # evaluation / oracle-alpha-selection cutoff (primary metric: NDCG@10)

# ---- WEIGHTED BORDA COUNT --------------------------------------------------
# score(d) = alpha*(N - rank_sparse(d)) + (1-alpha)*(N - rank_dense(d))
# alpha = 1 -> pure BM25 (lexical) ; alpha = 0 -> pure dense (semantic).
# Oracle alpha = the alpha maximising NDCG@eval_k for that query (lowest alpha
# wins ties). N is the Borda list length (= retrieval.top_k, the candidate pool).
borda:
  N: 1000                # Borda list length (keep equal to retrieval.top_k)
  alpha_min: 0.0
  alpha_max: 1.0
  alpha_step: 0.01      # 101-point grid search per query

# ---- PHASE-2 FEATURE DATASET (src/create_dataset.py) -----------------------
# Builds one training table PER SPLIT: one row per query, columns = the
# inference-time features (see docs/feature_dataset.md), label = oracle alpha
# (recomputed fresh here at top_k/eval_k so features and label are consistent).
# Corpus-level assets (term stats, inverted index, embeddings, centroid) are
# built ONCE and reused across all splits. Query embeddings for each split are
# computed in-script (no separate embed.py run per split needed).
create_dataset:
  splits: [train, dev, test]   # build a CSV for each split that has qrels (missing splits skipped)
  clarity_feedback_k: 50       # top docs used to build the query LM for Clarity Score (capped)
  coherence_window: 100        # W: top-W / bottom-W docs for autocorrelation & A-Pair-Ratio
  score_window_k: 100          # top-N scores for distribution-shape features (sigma_k/WIG/NQC/SMV/entropy/robust + z-cross); the deep top_k tail is retrieval noise. top_score/margin still use the very top; retrieval/fusion still use full top_k.
  zscore_eps: 1.0e-9           # epsilon guarding all divisions / normalisations
  debug_max_queries: null      # cap queries per split for smoke tests (null = all queries)
  # Ablation toggles -- set any to false to drop that feature group from the CSV.
  features:
    query_only: true           # group A: ql, IDF-family, SCS, AvICTF, SCQ, VAR, query-centroid cosine
    query_scope: true          # ω (needs the inverted index; slightly heavier one-time build)
    pmi: true                  # query-term PMI co-occurrence (needs the inverted index)
    per_retriever_scores: true # group B: top score, margin, sigma_k, WIG, NQC, SMV, entropy, robust sigma (x bm25/dense)
    clarity: true              # Clarity Score per retriever (needs top-k doc text; capped by clarity_feedback_k)
    coherence: true            # autocorrelation + A-Pair-Ratio per retriever (embeddings, top-W)
    cross_retriever: true      # group D: Jaccard@k, Kendall's tau, z-score-normalised score-difference features

# ---- ROUTER SCREENING (src/screen_routers.py) ------------------------------
# Stage 1: for every (family, framing) pair run an INDEPENDENT Optuna/TPE study
# over that family's hyperparameters. Fit on `train_subset` rows of the train
# split, score each trial by mean NDCG@eval_k on dev (via the precomputed
# alpha->NDCG curve). MSE/CE are logged as diagnostics only -- NEVER used to
# select, because the alpha->NDCG curve is flat over wide plateaus.
#
# Per-family studies (rather than one BO over a mixed space) give every family
# an identical trial budget, so the comparison is best-vs-best and fair.
router_screen:
  train_subset: 10000        # queries sampled from train for screening (seeded)
  n_trials: 50           # Optuna trials PER (family, framing) study
  bootstrap_resamples: 1000  # paired bootstrap over dev queries for the CIs
  n_bins: 11                 # bins for the "multibin" framing (expected value over bin centres)
  # Slow families are excluded on purpose: SVM is O(n^2)+ (dies at the 80k final
  # fit) and KNN pays O(n_train) at INFERENCE, which defeats a ~1ms router.
  families: [lightgbm, xgboost, catboost, hist_gbdt, random_forest, extra_trees, elasticnet, logreg, mlp]
  # regression: predict alpha directly (clipped to [0,1])
  # binary:     y = alpha > 0.5, use P(class=1) as alpha
  # multibin:   discretise alpha into n_bins, alpha = sum(proba * bin_centres)
  framings: [regression, binary, multibin]

# ---- MISC ------------------------------------------------------------------
seed: 42
